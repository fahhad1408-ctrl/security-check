
<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberSecurity Audit - V8.0</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --danger: #ff3e3e; --safe: #00ff88; --warn: #ffcc00; --bg: #0a0a0a; --card: #161616; --text: #e0e0e0; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; }
        .header { text-align: center; padding: 20px 0; border-bottom: 2px solid #222; margin-bottom: 20px; }
        .report-grid { display: grid; gap: 10px; }
        .card { background: var(--card); border-radius: 12px; padding: 15px; border: 1px solid #262626; }
        .label { color: #888; font-size: 11px; margin-bottom: 5px; display: block; }
        .value { color: #00d1ff; font-weight: bold; font-size: 14px; }
        .verdict-box { margin-top: 20px; padding: 20px; border-radius: 15px; text-align: center; font-size: 18px; font-weight: 800; border: 2px solid #333; }
        .btn-start { background: #00d1ff; color: #000; border: none; padding: 20px; width: 100%; border-radius: 50px; font-weight: bold; font-size: 18px; cursor: pointer; }
        .flag-red { color: var(--danger); }
        .flag-green { color: var(--safe); }
        #audit-ui { display: none; }
    </style>
</head>
<body>

<div id="welcome-ui" style="text-align: center; padding-top: 100px;">
    <div style="font-size: 80px; margin-bottom: 20px;">🛡️</div>
    <h1>النظام الأمني المتطور</h1>
    <p style="color: #666; margin-bottom: 40px;">بدء فحص البروتوكولات الجنائية للجهاز والشبكة</p>
    <button class="btn-start" onclick="runGlobalAudit()">تشغيل الفحص العميق</button>
</div>

<div id="audit-ui">
    <div class="header"><h3>تقرير التحقيق الرقمي</h3></div>
    <div class="report-grid">
        <div class="card"><span class="label">نوع المنصة:</span><span id="res_type" class="value">..</span></div>
        <div class="card"><span class="label">نظام التشغيل:</span><span id="res_os" class="val value">..</span></div>
        <div class="card"><span class="label">بيئة التشغيل:</span><span id="res_env" class="value">..</span></div>
        <div class="card"><span class="label">دولة الشبكة (IP):</span><span id="res_net_c" class="value">..</span></div>
        <div class="card"><span class="label">مزود الخدمة (ISP):</span><span id="res_isp" class="value">..</span></div>
        <div class="card"><span class="label">الموقع الدقيق (GPS):</span><span id="res_loc" class="value" style="color:var(--safe)">..</span></div>
        <div class="card"><span class="label">حالة الـ VPN:</span><span id="res_vpn" class="value">..</span></div>
        <div class="card"><span class="label">وضع المطور / التصحيح:</span><span id="res_dev" class="value">..</span></div>
        <div class="card"><span class="label">تلاعب الـ GPS:</span><span id="res_fake" class="value">..</span></div>
    </div>
    <div id="final_verdict" class="verdict-box">جاري تحليل الأدلة...</div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    async function runGlobalAudit() {
        document.getElementById('welcome-ui').style.display = 'none';
        document.getElementById('audit-ui').style.display = 'block';
        tg.HapticFeedback.impactOccurred('heavy');

        let riskScore = 0;
        let details = { vpn: false, fakeGps: false, env: "Real" };

        // 1. فحص الهوية الصلبة (Hardware & OS)
        const ua = navigator.userAgent;
        const isTouch = navigator.maxTouchPoints > 0;
        if (/iPhone|iPad/i.test(ua)) {
            document.getElementById('res_type').innerText = "جوال (Apple iPhone)";
            document.getElementById('res_os').innerText = "iOS / iPadOS";
        } else if (/Android/i.test(ua)) {
            document.getElementById('res_type').innerText = "جوال (Android)";
            document.getElementById('res_os').innerText = "Android OS";
        } else {
            document.getElementById('res_type').innerText = "كمبيوتر / محاكي 🚩";
            document.getElementById('res_os').innerText = navigator.platform;
            riskScore += 5;
        }
        document.getElementById('res_env').innerText = isTouch ? "بيئة لمس أصيلة ✅" : "بيئة سطح مكتب 🚩";

        // 2. فحص الشبكة (IP Analysis)
        let netData = {};
        try {
            const res = await fetch('https://ipapi.co/json/');
            netData = await res.json();
            document.getElementById('res_net_c').innerText = netData.country_name;
            document.getElementById('res_isp').innerText = netData.org;
            if (netData.country_code !== 'SA') { details.vpn = true; riskScore += 10; }
        } catch(e) { riskScore += 2; }

        // 3. فحص الموقع الحقيقي (GPS)
        navigator.geolocation.getCurrentPosition(async (pos) => {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            
            // كشف تلاعب الـ GPS (الدقة المثالية جداً تعني تلاعب)
            if (pos.coords.accuracy === 0 || pos.coords.accuracy === 10) { 
                details.fakeGps = true; riskScore += 10; 
            }

            try {
                const g = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&accept-language=ar`);
                const gData = await g.json();
                const addr = gData.address;
                const fullLoc = `${addr.suburb || addr.neighbourhood || ''} - ${addr.city || addr.town || ''}, ${addr.country}`;
                document.getElementById('res_loc').innerText = fullLoc;

                // المقارنة الصارمة: هل الـ IP يطابق الـ GPS؟
                if (addr.country_code !== (netData.country_code ? netData.country_code.toLowerCase() : '')) {
                    details.vpn = true; riskScore += 20;
                }
            } catch(e) { document.getElementById('res_loc').innerText = "موقع مجهول 🚩"; }

            // تحديث الواجهة بالنتائج الصارمة
            document.getElementById('res_vpn').innerHTML = details.vpn ? '<span class="flag-red">نشط (تلاعب مكتشف) 🚩</span>' : '<span class="flag-green">غير نشط ✅</span>';
            document.getElementById('res_dev').innerText = navigator.webdriver ? "مفعل (بيئة برمجية) 🚩" : "مغلق ✅";
            document.getElementById('res_fake').innerText = details.fakeGps ? "تلاعب مكتشف 🚩" : "لا يوجد ✅";
            
            if(navigator.webdriver) riskScore += 5;

            // الحكم النهائي
            const vBox = document.getElementById('final_verdict');
            if (riskScore === 0) {
                vBox.innerText = "النظام آمن: هوية حقيقية 100% ✅";
                vBox.style.borderColor = "var(--safe)"; vBox.style.color = "var(--safe)";
            } else {
                vBox.innerText = "تم كشف محاولة تلاعب جغرافية 🚫";
                vBox.style.borderColor = "var(--danger)"; vBox.style.color = "var(--danger)";
                tg.HapticFeedback.notificationOccurred('error');
            }
        }, () => {
            document.getElementById('final_verdict').innerText = "فشل: يرجى تفعيل الـ GPS للفحص";
        }, { enableHighAccuracy: true });
    }
</script>
</body>
</html>
