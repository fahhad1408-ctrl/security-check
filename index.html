<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Shield Pro - Ultimate</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { 
            --safe: #00ff88; --safe-glow: rgba(0, 255, 136, 0.3);
            --warn: #ffcc00; --warn-glow: rgba(255, 204, 0, 0.3);
            --danger: #ff0055; --danger-glow: rgba(255, 0, 85, 0.3);
            --bg: #020617; --card: #1e293b; --accent: #38bdf8;
        }
        body { background: var(--bg); color: #f8fafc; font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; padding: 20px; overflow-x: hidden; user-select: none; }
        .container { max-width: 450px; margin: 0 auto; }
        #welcome-screen { text-align: center; padding-top: 60px; }
        .radar { position: relative; width: 120px; height: 120px; margin: 0 auto 30px; border: 2px solid var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 50px; }
        .radar::after { content: ''; position: absolute; width: 100%; height: 100%; border: 2px solid var(--accent); border-radius: 50%; animation: ripple 2s linear infinite; }
        @keyframes ripple { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.8); opacity: 0; } }
        .main-btn { background: linear-gradient(45deg, #0ea5e9, #2563eb); color: white; border: none; padding: 20px 45px; border-radius: 15px; font-weight: 800; font-size: 18px; cursor: pointer; width: 100%; box-shadow: 0 10px 20px rgba(37, 99, 235, 0.3); }
        #audit-ui { display: none; }
        .card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border-radius: 20px; padding: 18px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 15px; }
        .section-title { font-size: 11px; color: #64748b; margin-bottom: 10px; display: block; border-right: 3px solid var(--accent); padding-right: 8px; }
        .row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .value { color: #fff; font-weight: 700; font-size: 13px; }
        .verdict-card { padding: 25px; border-radius: 20px; text-align: center; margin-top: 25px; border: 2px solid transparent; }
        .v-safe { border-color: var(--safe); background: var(--safe-glow); color: var(--safe); }
        .v-danger { border-color: var(--danger); background: var(--danger-glow); color: var(--danger); }
        .loader { width: 40px; height: 40px; border: 4px solid #1e293b; border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin: 30px auto; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <div id="welcome-screen">
        <div class="radar">🛡️</div>
        <h1>Cyber Shield V10</h1>
        <p style="color: #64748b; margin-bottom: 40px;">نظام التحقيق الجنائي الرقمي المستقل</p>
        <button class="main-btn" onclick="runAudit()">تفعيل الفحص الشامل</button>
    </div>

    <div id="audit-ui">
        <div style="text-align:center"><h2>تقرير التحقيق</h2><div id="loader" class="loader"></div></div>
        <div id="content" style="display:none">
            <div class="card">
                <span class="section-title">بيانات الحساب</span>
                <div class="row"><span>المستخدم:</span><span id="u_name" class="value">..</span></div>
                <div class="row"><span>معرف الـ ID:</span><span id="u_id" class="value">..</span></div>
            </div>
            <div class="card">
                <span class="section-title">الموقع والشبكة</span>
                <div class="row"><span>الدولة:</span><span id="d_ip_c" class="value">..</span></div>
                <div class="row"><span>الموقع:</span><span id="d_loc" class="value" style="color:var(--accent)">..</span></div>
            </div>
            <div class="card">
                <span class="section-title">تحليل المخاطر</span>
                <div class="row"><span>الـ VPN:</span><span id="d_vpn" class="value">..</span></div>
                <div class="row"><span>تلاعب الموقع:</span><span id="d_fake" class="value">..</span></div>
            </div>
            <div id="v_card" class="verdict-card">
                <div id="v_msg" style="font-size: 22px; font-weight: 900;">فحص..</div>
                <div id="v_sub">جاري النتيجة..</div>
            </div>
            <button onclick="location.reload()" style="width:100%; padding:15px; margin-top:20px; background:none; border:1px solid #334155; color:#64748b; border-radius:15px; cursor:pointer">إعادة تهيئة النظام</button>
        </div>
    </div>
</div>
